  <script>
    // این کد را در تمام صفحاتی که سبد خرید دارند قرار دهید
let cartCount = 0;

function addToCart(title, selectId, image, price, colorName) {
  const model = document.getElementById(selectId).value;
  if (!model) {
    alert("لطفاً مدل گوشی را انتخاب کنید.");
    return;
  }

  // دریافت رنگ انتخاب‌شده
  const colorRadio = document.querySelector(`input[name="${colorName}"]:checked`);
  const color = colorRadio ? colorRadio.value : "بدون رنگ";

  const cart = JSON.parse(localStorage.getItem("cart")) || [];
  cart.push({ 
    title, 
    model, 
    color, 
    price, 
    image,
    timestamp: new Date().getTime()
  });

  localStorage.setItem("cart", JSON.stringify(cart));
  updateCartCount();
  alert("✅ محصول با رنگ " + color + " به سبد خرید اضافه شد!");
}

function updateCartCount() {
  const cart = JSON.parse(localStorage.getItem("cart")) || [];
  cartCount = cart.length;
  document.getElementById("cartCount").textContent = cartCount;
}

function viewCart() {
  window.location.href = "cart.html";
}

// مقدار اولیه برای سبد خرید در صورت وجود
window.onload = () => {
  updateCartCount();
}
